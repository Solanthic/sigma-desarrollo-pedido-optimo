apiName: InventoryAlert
displayName: "Inventory Alert (Alerta de Inventario)"
pluralDisplayName: "Inventory Alerts"
description: >
  A daily alert generated when a store has one or more inventory misalignments
  (gaps between current and optimal inventory). The pipeline detects gaps at the
  SKU level (on OrderRecommendation), then aggregates them per store into an alert.

  The alert captures WHAT the gap is. The resolution depends on the retailer:
  - Walmart: adjust forecast levels in retailer system
  - Soriana: dispatch promoter to push at store
  - Chedraui/Others: retailer-specific execution paths

  Alerts have their own lifecycle — they are distributed (WhatsApp/PDF/email)
  and must be acknowledged by the responsible party.
titleProperty: alertId
primaryKey: alertId
status: ACTIVE

lifecycle:
  states: [generated, distributed, acknowledged, resolved, expired]
  initialState: generated

properties:
  alertId:
    type: String
    description: "Synthetic primary key: {alertDate}_{sapCode}"
    required: true
    sourceMapping:
      table: pipeline_computed
      column: null

  sapCode:
    type: String
    description: "Store this alert pertains to. Foreign key to Store."
    required: true
    sourceMapping:
      table: pipeline_computed
      column: Sap

  alertDate:
    type: Date
    description: "Date this alert was generated by the pipeline."
    required: true
    sourceMapping:
      table: pipeline_computed
      column: pipeline execution date

  # ── Gap Summary ───────────────────────────────────────────
  totalPushSkus:
    type: Integer
    description: "Number of SKUs at this store that need push (understocked)."
    required: false
    sourceMapping:
      table: pipeline_computed
      column: count of OrderRecommendation where classificationType=push

  totalCutSkus:
    type: Integer
    description: "Number of SKUs at this store that should be cut (overstocked with high waste)."
    required: false
    sourceMapping:
      table: pipeline_computed
      column: count of OrderRecommendation where cutFlag=true

  totalPushPieces:
    type: Integer
    description: "Total pieces recommended to push across all SKUs at this store."
    required: false
    sourceMapping:
      table: pipeline_computed
      column: sum of OrderRecommendation.pushQuantity for this store

  alertSeverity:
    type: String
    description: "Overall severity: critical (many high-priority gaps), warning (moderate gaps), info (minor adjustments)."
    required: false
    sourceMapping:
      table: pipeline_computed
      column: derived from gap count and priority distribution

  # ── Distribution ──────────────────────────────────────────
  distributionChannel:
    type: String
    description: "How this alert was/will be distributed: whatsapp, email, dashboard, or none."
    required: false
    sourceMapping:
      table: pipeline_computed
      column: derived from store contact availability

  pdfUrl:
    type: String
    description: "URL of the generated PDF alert if applicable."
    required: false
    sourceMapping:
      table: archivo.csv
      column: PDF URL

  recipientPhone:
    type: String
    description: "Phone number the alert was sent to."
    required: false
    sourceMapping:
      table: directorio_whatsapp
      column: Cel_ejecutivo

  # ── Lifecycle ─────────────────────────────────────────────
  status:
    type: String
    description: "Lifecycle state: generated, distributed, acknowledged, resolved, expired."
    required: true
    sourceMapping:
      table: null
      notes: "Managed by pipeline and actions"

  acknowledgedBy:
    type: String
    description: "Who acknowledged this alert."
    required: false
    sourceMapping:
      table: null
      notes: "Set by AcknowledgeAlert action"

  acknowledgedAt:
    type: Timestamp
    description: "When the alert was acknowledged."
    required: false
    sourceMapping:
      table: null
      notes: "Set by AcknowledgeAlert action"

  resolvedBy:
    type: String
    description: "Who resolved this alert (took the retailer-specific action)."
    required: false
    sourceMapping:
      table: null
      notes: "Set by resolution action"

  resolvedAt:
    type: Timestamp
    description: "When the alert was resolved."
    required: false
    sourceMapping:
      table: null
      notes: "Set by resolution action"

  resolutionNotes:
    type: String
    description: "What was done to resolve the misalignment."
    required: false
    sourceMapping:
      table: null
      notes: "Set by resolution action"

tags:
  - computed
